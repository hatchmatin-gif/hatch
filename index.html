<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Coffee Chat</title>
  
  <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkNvZmZlZSBDaGF0IiwKICAic2hvcnRfbmFtZSI6ICJDb2ZmZWUiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3ciOiAiIzAwMDAwMCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMDAwMDAiLAogICJpY29ucyI6IFtdCn0=">
  
  <style>
    :root {
      --main-orange: #ff6a11ff;
      --bg-black: #000000;
      --dark-gray: #1a1a1a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-black);
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      overflow: hidden;
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0;
    }

    #app-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      background-color: var(--bg-black);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Splash Screen */
    #splash-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: var(--bg-black);
      z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      animation: splashFadeOut 0.8s ease-in-out 1.5s forwards;
    }

    .splash-text {
      color: var(--main-orange);
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: lowercase;
      animation: splashZoom 1.5s ease-in-out forwards;
      text-align: center;
    }

    @keyframes splashZoom {
      0% { transform: scale(0.5); opacity: 0; }
      20% { transform: scale(1); opacity: 1; }
      80% { transform: scale(1); opacity: 1; }
      100% { transform: scale(5); opacity: 0; }
    }

    @keyframes splashFadeOut { to { visibility: hidden; opacity: 0; } }

    /* Header */
    header {
      padding: max(45px, env(safe-area-inset-top)) 20px 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .profile-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* [수정] 개 실루엣 아이콘 (SVG 사용) */
    .dog-silhouette {
      width: 42px;
      height: 42px;
      background-color: var(--main-orange);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px;
    }

    .user-info .sub-text { font-size: 0.75rem; color: #888; }
    .user-info .main-text { font-size: 1.1rem; font-weight: bold; }

    /* [수정] 알림 종 아이콘 & 뱃지 */
    .notification-bell {
      position: relative;
      cursor: pointer;
    }
    .bell-icon {
      fill: var(--main-orange);
      width: 28px;
      height: 28px;
    }
    .notification-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background-color: #ff3b30;
      color: white;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 10px;
      font-weight: bold;
      border: 2px solid var(--bg-black);
    }

    /* [추가] 주간 미팅 캘린더 섹션 */
    .calendar-section {
      padding: 10px 0 15px 0;
      transition: all 0.3s ease;
    }
    
    .calendar-strip {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 0 20px;
      scrollbar-width: none; /* Firefox */
    }
    .calendar-strip::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .date-item {
      min-width: 85px;
      background-color: var(--dark-gray);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      border: 1px solid #333;
      cursor: pointer;
    }
    .date-item.today { border-color: var(--main-orange); }
    .date-item .day-label { font-size: 0.7rem; color: #888; margin-bottom: 4px; }
    .date-item .date-label { font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; color: var(--main-orange); }
    .date-item .meeting-info { font-size: 0.65rem; line-height: 1.3; color: #ccc; }

    /* Main Content */
    main {
      flex: 1;
      padding: 0 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .near-card {
      background-color: var(--main-orange);
      border-radius: 20px;
      padding: 20px;
      color: #000;
      position: relative;
      overflow: hidden;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .near-header { font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; }
    .near-bg-text {
      position: absolute; bottom: -5px; left: 10px;
      font-size: 4rem; font-weight: 900; transform: rotate(-8deg);
      opacity: 0.7; line-height: 1;
    }
    .near-badge {
      align-self: flex-end; background-color: #000; color: var(--main-orange);
      padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; z-index: 1;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .action-card {
      border: 1px solid var(--main-orange);
      border-radius: 18px;
      padding: 15px;
      display: flex; flex-direction: column; justify-content: center;
      transition: 0.2s;
    }
    .action-card.filled { background-color: var(--main-orange); color: #000; grid-row: span 2; }
    .card-title { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; text-align: right; color: var(--main-orange); }
    .filled .card-title { color: #000; text-align: left; }
    .filled .card-subtitle { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
    .filled ul { list-style: none; font-size: 0.8rem; font-weight: bold; line-height: 1.4; }
    
    .point-display { font-size: 1.1rem; font-weight: bold; color: var(--main-orange); margin-bottom: 5px; }

    /* Nav */
    nav {
      background-color: #111;
      border-top: 1px solid #222;
      display: flex;
      border-radius: 25px 25px 0 0;
      padding: 15px 0 max(20px, env(safe-area-inset-bottom)) 0;
      justify-content: space-around;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; color: #666; cursor: pointer; }
    .nav-icon { width: 22px; height: 22px; background-color: var(--main-orange); border-radius: 5px; opacity: 0.8; }
    .nav-item.active { color: #fff; }

    #admin-panel {
      display: none; padding: 15px; background-color: #222; border-radius: 15px;
    }
    #admin-panel input, #admin-panel button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; }
    #admin-panel button { background-color: var(--main-orange); font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div id="app-container">
    <div id="splash-screen">
      <div class="splash-text">coffee<br>chat</div>
    </div>

    <header>
      <div class="profile-area">
        <div class="dog-silhouette">
          <svg viewBox="0 0 24 24" width="30" height="30">
            <path fill="#000000" d="M19,5.5C19,4.67 18.33,4 17.5,4C16.67,4 16,4.67 16,5.5C16,6.33 16.67,7 17.5,7C18.33,7 19,6.33 19,5.5M19,10H17.5C16.12,10 15,11.12 15,12.5V13.33L11.5,10.5C10.88,10.03 10,10.47 10,11.25V14.67L8.5,13.5C7.88,13.03 7,13.47 7,14.25V18.5C7,19.33 7.67,20 8.5,20H17.5C18.33,20 19,19.33 19,18.5V10Z" />
          </svg>
        </div>
        <div class="user-info">
          <div class="sub-text">normal meeter. v7</div>
          <div class="main-text">Kim yum</div>
        </div>
      </div>
      
      <div class="notification-bell" onclick="toggleAdminPanel()">
        <svg class="bell-icon" viewBox="0 0 24 24">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <div class="notification-badge">3</div>
      </div>
    </header>

    <section class="calendar-section">
      <div class="calendar-strip" id="calendar-strip">
        </div>
    </section>

    <main>
      <section class="near-card">
        <div class="near-header">인하대점 - 아이스 아메리카노 T</div>
        <div style="flex:1; border:1px dashed rgba(0,0,0,0.2); border-radius:15px; display:flex; justify-content:center; align-items:center; font-size:0.8rem; font-weight:bold; color:rgba(0,0,0,0.4);">
          [ 이미지 / 영상 노출 영역 ]
        </div>
        <div class="near-bg-text">NEAR!</div>
        <div class="near-badge" onclick="mockChargePoint()">산미가 뛰어나네요! ✨</div>
      </section>

      <section class="grid-container">
        <div class="action-card" onclick="alert('포인트 런처 실행')">
          <div class="card-title">POINT<br>Launcher</div>
        </div>
        
        <div class="action-card filled">
          <div class="card-title">MOIZA</div>
          <div class="card-subtitle">모이자</div>
          <ul>
            <li>- 주선자 포인트 결제</li>
            <li>- 메뉴/결제 미리하기</li>
            <li>- 실시간 위치 공유</li>
          </ul>
        </div>

        <div class="action-card my-usual" onclick="location.reload(true)">
          <div class="point-display"><span id="point-balance">16,200</span> (CUP)</div>
          <div class="card-title">MY<br>USUAL</div>
        </div>
      </section>

      <section id="admin-panel">
        <h4 style="color:var(--main-orange); margin-bottom:5px;">관리자 도구</h4>
        <input type="number" id="target-point" placeholder="변경할 포인트 값">
        <button onclick="executeAdminPointChange()">즉시 반영</button>
      </section>
    </main>

    <nav>
      <div class="nav-item active"><div class="nav-icon"></div><div>홈</div></div>
      <div class="nav-item"><div class="nav-icon"></div><div>포인트</div></div>
      <div class="nav-item"><div class="nav-icon"></div><div>단골</div></div>
      <div class="nav-item" onclick="location.reload(true)"><div class="nav-icon"></div><div>새로고침</div></div>
    </nav>
  </div>

  <script>
    const APP_VERSION = '1.0.2';
    
    document.addEventListener("DOMContentLoaded", () => {
      generateCalendar();
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) splash.remove();
      }, 2300);
    });

    // 주간 캘린더 생성 함수
    function generateCalendar() {
      const strip = document.getElementById('calendar-strip');
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const now = new Date();
      
      for (let i = 0; i < 14; i++) {
        const date = new Date();
        date.setDate(now.getDate() + i);
        
        const dateItem = document.createElement('div');
        dateItem.className = 'date-item' + (i === 0 ? ' today' : '');
        
        // 더미 미팅 데이터 (실제 데이터 연동 가능)
        let meetingHtml = '';
        if (i === 0) meetingHtml = '(1: 13:00)<br>(2: 14:00)';
        else if (i === 1) meetingHtml = '(1: 15:30)';
        else meetingHtml = '-';

        dateItem.innerHTML = `
          <div class="day-label">${days[date.getDay()]}</div>
          <div class="date-label">${(date.getMonth()+1)}.${date.getDate()}</div>
          <div class="meeting-info">${meetingHtml}</div>
        `;
        
        dateItem.onclick = () => alert(`${date.toLocaleDateString()} 달력 상세 보기`);
        strip.appendChild(dateItem);
      }
    }

    function toggleAdminPanel() {
      const panel = document.getElementById('admin-panel');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function executeAdminPointChange() {
      const val = document.getElementById('target-point').value;
      if (!val) return;
      document.getElementById('point-balance').innerText = parseInt(val).toLocaleString();
      alert('포인트가 조정되었습니다.');
      toggleAdminPanel();
    }

    function mockChargePoint() {
      if (confirm('1만원을 충전하시겠습니까?')) {
        let current = document.getElementById('point-balance').innerText.replace(/,/g, '');
        document.getElementById('point-balance').innerText = (parseInt(current) + 10000).toLocaleString();
      }
    }
  </script>
</body>
</html>
